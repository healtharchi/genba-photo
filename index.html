<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="現場写真" />
<meta name="theme-color" content="#ffffff" />
<title>HEALTH ARCHI 現場写真</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: {
    colors: {
      ink:'#0f2a43', sub:'#6a7787', line:'#e6eaef', bg:'#f5f7f9', card:'#ffffff',
      brand:'#0f2a43', branddark:'#0a1d30', amber:'#e6a200', ok:'#1faa54', danger:'#e5484d'
    },
    fontFamily: { sans:['"Hiragino Sans"','"Hiragino Kaku Gothic ProN"','"Yu Gothic Medium"','system-ui','sans-serif'] },
    boxShadow:{ soft:'0 1px 3px rgba(20,33,46,.06), 0 4px 16px rgba(20,33,46,.05)' }
  }}}
</script>
<style>
  html,body,#root{height:100%;}
  body{background:#f7f9fb;-webkit-tap-highlight-color:transparent;overscroll-behavior:none;
    padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);}
  .tap{transition:transform .12s cubic-bezier(.2,.8,.2,1), background .15s, opacity .15s, box-shadow .15s;}
  .tap:active{transform:scale(.97);}
  .scroll-x{-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .scroll-x::-webkit-scrollbar{display:none}
  select{-webkit-appearance:none;appearance:none;background:none;}
  @keyframes flash{0%{opacity:0}25%{opacity:.9}100%{opacity:0}}
  .flash{animation:flash .4s ease}
  @keyframes sheetup{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .sheetup{animation:sheetup .26s cubic-bezier(.2,.8,.2,1)}
  @keyframes fadein{from{opacity:0}to{opacity:1}}
  .fadein{animation:fadein .2s ease}
  @keyframes toastin{0%{opacity:0;transform:translate(-50%,8px)}100%{opacity:1;transform:translate(-50%,0)}}
  .toastin{animation:toastin .22s ease}
  /* スワイプで削除（写真一覧の行） */
  .swipe-wrap{position:relative;overflow:hidden;border-radius:14px;}
  .swipe-row{transition:transform .22s cubic-bezier(.2,.8,.2,1);will-change:transform;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ===== アイコン（線画SVG・統一）===== */
const Ic = {
  camera:(p)=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={p&&p.w||1.7} strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M3 8.5A2.5 2.5 0 0 1 5.5 6h1.2a1 1 0 0 0 .8-.4l.9-1.2A1 1 0 0 1 9.2 4h5.6a1 1 0 0 1 .8.4l.9 1.2a1 1 0 0 0 .8.4h1.2A2.5 2.5 0 0 1 21 8.5v8A2.5 2.5 0 0 1 18.5 19h-13A2.5 2.5 0 0 1 3 16.5z"/><circle cx="12" cy="12.5" r="3.4"/></svg>,
  grid:(p)=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={p&&p.w||1.7} strokeLinecap="round" strokeLinejoin="round" {...p}><rect x="4" y="4" width="6.5" height="6.5" rx="1.4"/><rect x="13.5" y="4" width="6.5" height="6.5" rx="1.4"/><rect x="4" y="13.5" width="6.5" height="6.5" rx="1.4"/><rect x="13.5" y="13.5" width="6.5" height="6.5" rx="1.4"/></svg>,
  gear:(p)=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={p&&p.w||1.7} strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 13.5a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
  pin:(p)=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={p&&p.w||1.7} strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0z"/><circle cx="12" cy="10" r="2.6"/></svg>,
  chevron:(p)=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={p&&p.w||2} strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M9 6l6 6-6 6"/></svg>,
  down:(p)=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={p&&p.w||2} strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M6 9l6 6 6-6"/></svg>,
  up:(p)=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={p&&p.w||2} strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M18 15l-6-6-6 6"/></svg>,
  share:(p)=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={p&&p.w||1.8} strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M12 15V3"/><path d="M8 7l4-4 4 4"/><path d="M5 12v6a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-6"/></svg>,
  trash:(p)=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={p&&p.w||1.8} strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M4 7h16M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2m2 0v12a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V7"/><path d="M10 11v6M14 11v6"/></svg>,
  close:(p)=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={p&&p.w||2} strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M6 6l12 12M18 6L6 18"/></svg>,
  plus:(p)=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={p&&p.w||2} strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M12 5v14M5 12h14"/></svg>,
  check:(p)=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={p&&p.w||2.2} strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M5 12l5 5L20 7"/></svg>,
  pencil:(p)=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={p&&p.w||1.8} strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>,
  grip:(p)=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={p&&p.w||1.8} strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="9" cy="6" r="1"/><circle cx="15" cy="6" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="9" cy="18" r="1"/><circle cx="15" cy="18" r="1"/></svg>,
};

/* ===== 既定の工種 ===== */
const DEFAULT_CATS = [
  { name:'仮設', subs:['仮設足場','現場養生'] },
  { name:'基礎', subs:['根切','砕石','防水シート','捨てコン','配筋','型枠','スリーブ','コンクリ打込','アンカーボルト','基礎全景'] },
  { name:'躯体', subs:['土台','建方','上棟式','野地板','構造金物','耐力壁'] },
  { name:'屋根・雨どい', subs:['ルーフィング','屋根葺き','板金','雨樋'] },
  { name:'外装', subs:['サッシ','透湿防水シート','通気層','外壁施工','シーリング','軒天','外部塗装'] },
  { name:'防水', subs:['下地','防水'] },
  { name:'断熱', subs:['断熱材施工','気密処理'] },
  { name:'給排水', subs:['先行配管','内部配管','器具取付','外部配管'] },
  { name:'電気・ガス', subs:['内部配線','器具設置','ガス配管'] },
  { name:'設備', subs:['UB','キッチン','給湯器','太陽光','浄化槽'] },
  { name:'内装仕上', subs:['床','壁下地','天井下地','石膏ボード','階段','クロス','タイル','建具','造作','内部塗装'] },
  { name:'外構', subs:['ポーチ','土間下地','土間施工','門回り','植栽','造成'] },
  { name:'完了・検査', subs:['中間検査','完了検査'] },
];

/* ===== DB ===== */
const DB='ha_genba2', STORE='photos', VER=1;
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB,VER);
  r.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains(STORE))db.createObjectStore(STORE,{keyPath:'id'});};
  r.onsuccess=e=>res(e.target.result);r.onerror=e=>rej(e.target.error);});}
async function dbPut(rec){const db=await openDB();return new Promise((res,rej)=>{const t=db.transaction(STORE,'readwrite');t.objectStore(STORE).put(rec);t.oncomplete=res;t.onerror=e=>rej(e.target.error);});}
async function dbAll(){const db=await openDB();return new Promise((res,rej)=>{const t=db.transaction(STORE,'readonly');const q=t.objectStore(STORE).getAll();q.onsuccess=()=>res(q.result||[]);q.onerror=e=>rej(e.target.error);});}
async function dbDel(id){const db=await openDB();return new Promise((res,rej)=>{const t=db.transaction(STORE,'readwrite');t.objectStore(STORE).delete(id);t.oncomplete=res;t.onerror=e=>rej(e.target.error);});}
async function dbDelMany(ids){const db=await openDB();return new Promise((res,rej)=>{const t=db.transaction(STORE,'readwrite');const os=t.objectStore(STORE);ids.forEach(id=>os.delete(id));t.oncomplete=res;t.onerror=e=>rej(e.target.error);});}

/* ===== 設定 ===== */
const LS_SITES='ha2_sites', LS_CATS='ha2_cats', LS_LAST='ha2_last', LS_USESUB='ha2_usesub';
const jget=(k,d)=>{try{const v=JSON.parse(localStorage.getItem(k));return v==null?d:v;}catch(e){return d;}};
const jset=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
const loadSites=()=>jget(LS_SITES,[]);
const loadCats=()=>{const v=jget(LS_CATS,null);return (v&&v.length)?v:JSON.parse(JSON.stringify(DEFAULT_CATS));};
const loadUseSub=()=>jget(LS_USESUB,true);

function shrink(file,max=1600){return new Promise(res=>{const img=new Image();
  img.onload=()=>{let w=img.width,h=img.height;if(Math.max(w,h)>max){const r=max/Math.max(w,h);w=Math.round(w*r);h=Math.round(h*r);}
    const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',0.82));};
  img.src=URL.createObjectURL(file);});}

const p2=n=>String(n).padStart(2,'0');
const p3=n=>String(n).padStart(3,'0');
const ymd=ts=>{const d=new Date(ts);return ''+d.getFullYear()+p2(d.getMonth()+1)+p2(d.getDate());};
const ymdJ=ts=>{const d=new Date(ts);return (d.getMonth()+1)+'/'+d.getDate();};
const hm=ts=>{const d=new Date(ts);return p2(d.getHours())+':'+p2(d.getMinutes());};

function buildName(p,cats){
  const ci=cats.findIndex(c=>c.name===p.cat);
  const cnum=ci>=0?(ci+1):0;
  let base=(cnum>0?cnum+'_':'')+p.cat;
  if(p.sub){const si=ci>=0?cats[ci].subs.indexOf(p.sub):-1;const snum=si>=0?p2(si+1):'';base+='_'+(snum?snum+'_':'')+p.sub;}
  return base+'_'+ymd(p.ts)+'_'+p3(p._seq||1);
}
function dataURLtoBlob(durl){const a=durl.split(',');const mime=a[0].match(/:(.*?);/)[1];const bin=atob(a[1]);const u=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return new Blob([u],{type:mime});}

/* ============ 撮影 ============ */
function Capture({sites,site,setSite,cats,cat,setCat,sub,setSub,useSub,onShot,todayCount,goSet}){
  const fileRef=useRef();
  const [flash,setFlash]=useState(false);
  const [busy,setBusy]=useState(false);
  const [sheet,setSheet]=useState(false);
  const curCat=cats.find(c=>c.name===cat)||cats[0];

  const onPick=async e=>{
    const files=[].slice.call(e.target.files||[]); if(!files.length)return;
    setBusy(true);
    for(const f of files){const data=await shrink(f);
      await dbPut({id:'p_'+Date.now()+'_'+Math.random().toString(36).slice(2,7),site,cat,sub:useSub?(sub||''):'',ts:Date.now(),img:data,exported:false});await onShot();}
    setFlash(true);setTimeout(()=>setFlash(false),400); e.target.value='';setBusy(false);
  };

  if(!sites.length){
    return <div className="flex flex-col items-center justify-center h-full px-10 text-center">
      <div className="w-16 h-16 rounded-2xl bg-brand/10 text-brand flex items-center justify-center mb-5"><Ic.pin style={{width:30,height:30}}/></div>
      <p className="text-ink font-bold text-lg mb-1.5">現場を登録しましょう</p>
      <p className="text-sub text-sm mb-6 leading-relaxed">設定から現場名を追加すると、<br/>撮影を始められます。</p>
      <button onClick={goSet} className="tap bg-brand text-white font-bold px-7 py-3.5 rounded-2xl shadow-soft">設定をひらく</button>
    </div>;
  }

  return (
    <div className="flex flex-col h-full select-none bg-bg">
      {flash && <div className="flash fixed inset-0 bg-black z-50 pointer-events-none"/>}

      {/* 現場ボタン */}
      <div className="px-4 pt-3">
        <button onClick={()=>setSheet(true)} className="tap w-full bg-card rounded-2xl px-4 py-3 shadow-soft flex items-center justify-between">
          <span className="flex items-center gap-2.5 min-w-0">
            <span className="text-brand shrink-0"><Ic.pin style={{width:19,height:19}}/></span>
            <span className="text-ink text-[17px] font-bold truncate">{site}</span>
          </span>
          <span className="text-sub shrink-0"><Ic.down style={{width:18,height:18}}/></span>
        </button>
      </div>

      {/* 大分類 */}
      <div className="pt-3">
        <div className="px-4 text-sub text-[12px] font-semibold mb-1.5 tracking-wide">{useSub?'工種':'工種を選んで撮影'}</div>
        <div className="scroll-x overflow-x-auto flex gap-2 px-4">
          {cats.map(c=>{const on=cat===c.name;
            return <button key={c.name} onClick={()=>{setCat(c.name);setSub('');}}
              className={"tap shrink-0 rounded-full px-4 py-2 text-[14px] font-semibold border "+(on?'bg-ink text-white border-ink':'bg-card text-ink/70 border-line')}>{c.name}</button>;})}
        </div>
      </div>

      {/* 小分類（useSub時のみ） */}
      {useSub && <div className="pt-2.5">
        <div className="px-4 text-sub text-[12px] font-semibold mb-1.5 tracking-wide">小分類<span className="text-sub/60 font-normal">（任意）</span></div>
        <div className="scroll-x overflow-x-auto flex gap-2 px-4">
          <button onClick={()=>setSub('')} className={"tap shrink-0 rounded-full px-4 py-2 text-[14px] border "+(!sub?'bg-amber/15 text-ink border-amber/50 font-semibold':'bg-card text-sub border-line')}>指定なし</button>
          {curCat.subs.map(s=>{const on=sub===s;
            return <button key={s} onClick={()=>setSub(s)} className={"tap shrink-0 rounded-full px-4 py-2 text-[14px] border "+(on?'bg-amber text-ink border-amber font-bold':'bg-card text-ink/70 border-line')}>{s}</button>;})}
        </div>
      </div>}

      {/* シャッター */}
      <div className="flex-1 flex flex-col items-center justify-center px-6 min-h-0">
        <input ref={fileRef} type="file" accept="image/*" capture="environment" multiple className="hidden" onChange={onPick}/>
        <div className="text-sub text-[13px] mb-4 font-medium">
          <span className="text-ink font-bold">{cat}</span>{useSub&&sub?<span className="text-amber font-bold"> ／ {sub}</span>:''} に保存
        </div>
        <button disabled={busy} onClick={()=>fileRef.current.click()}
          className="tap relative w-44 h-44 rounded-full bg-ink text-white flex items-center justify-center disabled:opacity-60"
          style={{boxShadow:'0 10px 30px rgba(15,42,67,.30)'}}>
          <span className="absolute inset-2.5 rounded-full border-2 border-amber/70"></span>
          {busy?<span className="font-bold text-lg">保存中…</span>:<Ic.camera style={{width:62,height:62}} w={1.5}/>}
        </button>
        <div className="text-sub/70 text-[12px] mt-4">押すたびに撮影・自動で名前がつきます</div>
      </div>

      <div className="px-4 pb-3">
        <div className="bg-card rounded-xl py-2.5 text-center text-sub text-[13px] shadow-soft">
          今日の <span className="text-ink font-bold">{cat}{useSub&&sub?'／'+sub:''}</span>　<span className="text-ink font-bold text-[15px]">{todayCount}</span> 枚
        </div>
      </div>

      {/* 現場シート */}
      {sheet && <div className="fixed inset-0 z-40 bg-black/30 fadein flex items-end" onClick={()=>setSheet(false)}>
        <div className="sheetup w-full bg-card rounded-t-3xl max-h-[72%] overflow-y-auto p-4 pb-7" onClick={e=>e.stopPropagation()}>
          <div className="w-10 h-1 bg-line rounded-full mx-auto mb-4"></div>
          <div className="text-ink font-bold mb-3 px-1 text-[15px]">現場を選ぶ</div>
          <div className="space-y-1.5">
            {sites.map(s=>{const on=s===site;
              return <button key={s} onClick={()=>{setSite(s);setSheet(false);}}
                className={"tap w-full text-left rounded-xl px-4 py-3.5 flex items-center justify-between "+(on?'bg-brand text-white':'bg-bg text-ink')}>
                <span className="flex items-center gap-2 truncate"><Ic.pin style={{width:17,height:17}}/> <span className="truncate font-medium">{s}</span></span>
                {on&&<Ic.check style={{width:18,height:18}}/>}</button>;})}
          </div>
        </div>
      </div>}
    </div>
  );
}

/* ============ 写真一覧（横スワイプ閲覧＋スワイプ削除） ============ */
function Gallery({photos,reload,onExport,cats,onOpen}){
  const [site,setSite]=useState(null);
  const [cat,setCat]=useState(null);
  const sites=Array.from(new Set(photos.map(p=>p.site)));
  useEffect(()=>{ if(sites.length&&(site===null||sites.indexOf(site)<0)){setSite(sites[0]);setCat(null);} },[photos]);

  if(!photos.length) return <div className="flex flex-col items-center justify-center h-full px-10 text-center">
    <div className="w-16 h-16 rounded-2xl bg-ink/5 text-ink/40 flex items-center justify-center mb-5"><Ic.grid style={{width:30,height:30}}/></div>
    <p className="text-ink font-bold text-lg mb-1">まだ写真がありません</p>
    <p className="text-sub text-sm">撮影すると、ここに現場ごとに並びます。</p>
  </div>;

  const sp=photos.filter(p=>p.site===site);
  const catsInSite=cats.filter(c=>sp.some(p=>p.cat===c.name)).map(c=>c.name);
  const shown=(cat?sp.filter(p=>p.cat===cat):sp).sort((a,b)=>b.ts-a.ts);
  const unexp=shown.filter(p=>!p.exported).length;

  return (
    <div className="flex flex-col h-full bg-bg">
      <div className="scroll-x overflow-x-auto flex gap-2 px-4 pt-3 pb-2">
        {sites.map(s=>{const on=s===site;return <button key={s} onClick={()=>{setSite(s);setCat(null);}}
          className={"tap shrink-0 rounded-full px-4 py-2 text-[14px] font-semibold border "+(on?'bg-ink text-white border-ink':'bg-card text-ink/70 border-line')}>{s}</button>;})}
      </div>
      <div className="scroll-x overflow-x-auto flex gap-2 px-4 pb-2.5">
        <button onClick={()=>setCat(null)} className={"tap shrink-0 rounded-full px-3.5 py-1.5 text-[13px] border "+(!cat?'bg-amber/15 text-ink border-amber/50 font-semibold':'bg-card text-sub border-line')}>すべて</button>
        {catsInSite.map(c=>{const on=c===cat;return <button key={c} onClick={()=>setCat(c)} className={"tap shrink-0 rounded-full px-3.5 py-1.5 text-[13px] border "+(on?'bg-amber/15 text-ink border-amber/50 font-semibold':'bg-card text-sub border-line')}>{c}</button>;})}
      </div>
      <div className="px-4 pb-2.5 flex items-center justify-between">
        <span className="text-sub text-[13px]">{shown.length}枚{unexp>0 && <span className="text-amber font-semibold">・未保存 {unexp}</span>}</span>
        <button onClick={()=>onExport(shown)} className="tap inline-flex items-center gap-1.5 bg-brand text-white text-[13px] font-bold pl-3 pr-3.5 py-2 rounded-full shadow-soft">
          <Ic.share style={{width:15,height:15}}/> データを保存
        </button>
      </div>
      <div className="flex-1 overflow-y-auto px-1 pb-4">
        <div className="grid grid-cols-3 gap-[3px]">
          {shown.map((p,idx)=>(

/* ============ 大画面ビューア（左右スワイプ・スワイプダウンで閉じる） ============ */
function Viewer({list,index,cats,onClose,onDelete}){
  const [i,setI]=useState(index);
  const start=useRef(null);
  const [dx,setDx]=useState(0);
  const [dy,setDy]=useState(0);
  useEffect(()=>{setI(index);},[index]);
  if(!list||!list.length)return null;
  const p=list[Math.max(0,Math.min(i,list.length-1))];

  const onTS=e=>{const t=e.touches[0];start.current={x:t.clientX,y:t.clientY,t:Date.now()};};
  const onTM=e=>{if(!start.current)return;const t=e.touches[0];const ddx=t.clientX-start.current.x;const ddy=t.clientY-start.current.y;
    if(Math.abs(ddy)>Math.abs(ddx)&&ddy>0){setDy(ddy);setDx(0);}else{setDx(ddx);setDy(0);}};
  const onTE=()=>{
    if(dy>110){onClose();return;}
    if(dx<-60 && i<list.length-1)setI(i+1);
    else if(dx>60 && i>0)setI(i-1);
    setDx(0);setDy(0);start.current=null;
  };

  return (
    <div className="fixed inset-0 z-50 bg-black flex flex-col fadein" style={{opacity:dy>0?Math.max(.4,1-dy/400):1}}>
      <div className="flex items-center justify-between px-3 py-3" style={{paddingTop:'calc(env(safe-area-inset-top) + 8px)'}}>
        <button onClick={onClose} className="tap text-white/90 p-1.5"><Ic.close style={{width:26,height:26}}/></button>
        <span className="text-white/55 text-[12px]">{i+1} / {list.length}</span>
        <button onClick={()=>onDelete(p,i)} className="tap text-white/90 p-1.5"><Ic.trash style={{width:23,height:23}}/></button>
      </div>
      <div className="flex-1 flex items-center justify-center min-h-0 overflow-hidden" onTouchStart={onTS} onTouchMove={onTM} onTouchEnd={onTE}>
        <img src={p.img} draggable={false} className="max-w-full max-h-full object-contain select-none"
          style={{transform:'translate('+dx+'px,'+dy+'px)',transition:start.current?'none':'transform .25s'}}/>
      </div>
      <div className="px-5 py-5 text-center" style={{paddingBottom:'calc(env(safe-area-inset-bottom) + 16px)'}}>
        <div className="text-white font-bold text-[15px]">{p.cat}{p.sub?'　/　'+p.sub:''}</div>
        <div className="text-white/45 text-[12px] mt-1.5 font-mono">{buildName(p,cats)}.jpg</div>
        <div className="text-white/35 text-[12px] mt-0.5">{p.site}・{ymdJ(p.ts)} {hm(p.ts)}・{p.exported?'保存済':'未保存'}</div>
      </div>
    </div>
  );
}

/* ============ スワイプ削除できる行 ============ */
function SwipeRow({children,onDelete}){
  const [x,setX]=useState(0);
  const start=useRef(null);
  const onTS=e=>{start.current=e.touches[0].clientX;};
  const onTM=e=>{if(start.current==null)return;const d=e.touches[0].clientX-start.current;setX(Math.max(-88,Math.min(0,(x<-10?-88:0)+d)));};
  const onTE=()=>{setX(x<-44?-88:0);start.current=null;};
  return <div className="swipe-wrap bg-danger">
    <button onClick={onDelete} className="absolute right-0 top-0 h-full w-[88px] flex items-center justify-center text-white"><Ic.trash style={{width:20,height:20}}/></button>
    <div className="swipe-row bg-card" style={{transform:'translateX('+x+'px)'}} onTouchStart={onTS} onTouchMove={onTM} onTouchEnd={onTE}>{children}</div>
  </div>;
}

/* ============ ドラッグで並べ替えできるリスト（タッチ対応） ============ */
function DragList({items,onReorder,rowHeight,renderRow}){
  const [drag,setDrag]=useState(-1);      /* つかんでいる元の index */
  const [over,setOver]=useState(-1);      /* いま重なっている index */
  const [y,setY]=useState(0);             /* 指のY移動量(px) */
  const wrapRef=useRef(null);
  const startY=useRef(0);
  const rh=rowHeight||52;

  const begin=(i,clientY)=>{ setDrag(i); setOver(i); startY.current=clientY; setY(0); };
  const moveTo=(clientY)=>{
    if(drag<0)return;
    const dy=clientY-startY.current; setY(dy);
    const shift=Math.round(dy/rh);
    let target=Math.max(0,Math.min(items.length-1,drag+shift));
    setOver(target);
  };
  const end=()=>{
    if(drag>=0&&over>=0&&over!==drag){
      const a=items.slice(); const [m]=a.splice(drag,1); a.splice(over,0,m); onReorder(a);
    }
    setDrag(-1);setOver(-1);setY(0);
  };

  return (
    <div ref={wrapRef} className="space-y-1.5 relative"
      onTouchMove={e=>{if(drag>=0){e.preventDefault();moveTo(e.touches[0].clientY);}}}
      onTouchEnd={end}
      onMouseMove={e=>{if(drag>=0)moveTo(e.clientY);}}
      onMouseUp={end} onMouseLeave={()=>{if(drag>=0)end();}}
      style={{touchAction:drag>=0?'none':'auto'}}>
      {items.map((it,i)=>{
        const isDrag=i===drag;
        let translate=0;
        if(drag>=0&&!isDrag){
          if(drag<over && i>drag && i<=over) translate=-rh;
          else if(drag>over && i<drag && i>=over) translate=rh;
        }
        const handle=(clientY)=>begin(i,clientY);
        return (
          <div key={it.key} style={{
            transform: isDrag?('translateY('+y+'px) scale(1.02)'):('translateY('+translate+'px)'),
            transition: isDrag?'none':'transform .18s cubic-bezier(.2,.8,.2,1)',
            zIndex: isDrag?20:1, position:'relative',
            boxShadow: isDrag?'0 8px 24px rgba(15,42,67,.18)':'none',
            opacity: isDrag?0.97:1,
          }}>
            {renderRow(it,i,{
              onTouchStart:(e)=>{handle(e.touches[0].clientY);},
              onMouseDown:(e)=>{handle(e.clientY);},
            })}
          </div>
        );
      })}
    </div>
  );
}

function App(){

  const [cat,setCat]=useState(last.cat||loadCats()[0].name);
  const [sub,setSub]=useState(last.sub||'');

  const reload=useCallback(async()=>{setPhotos(await dbAll());},[]);

  const todayStr=ymd(Date.now());

    await dbDel(p.id);

        <div className="flex items-center gap-2">
          <span className="text-brand font-black text-[12px] tracking-wider">HEALTH ARCHI</span>
          <span className="text-line">|</span>
          <span className="text-ink font-bold text-[14px]">現場写真</span>
        </div>
      </div>
      <div className="flex-1 overflow-hidden">
        {tab==='cap' && <Capture sites={sites} site={site} setSite={setSite} cats={cats} cat={cat} setCat={setCat} sub={sub} setSub={setSub} useSub={useSub} onShot={reload} todayCount={todayCount} goSet={()=>setTab('set')}/>}
        {tab==='gal' && <Gallery photos={photos} reload={reload} onExport={exportPhotos} cats={cats} onOpen={openViewer}/>}
        {tab==='set' && <Settings sites={sites} setSites={setSites} cats={cats} setCats={setCats} useSub={useSub} setUseSub={setUseSub} photos={photos} reload={reload} flash={flash}/>}
      </div>
      <div className="bg-card/95 backdrop-blur border-t border-line flex">
        <TabBtn id="cap" Icon={Ic.camera} label="撮影"/>
        <TabBtn id="gal" Icon={Ic.grid} label="写真一覧"/>
        <TabBtn id="set" Icon={Ic.gear} label="設定"/>
      </div>
      {viewer && <Viewer list={viewer.list} index={viewer.index} cats={cats} onClose={()=>setViewer(null)} onDelete={delFromViewer}/>}
      {toast && <div className="toastin fixed bottom-24 left-1/2 bg-ink text-white px-5 py-2.5 rounded-full font-semibold text-[14px] shadow-lg z-50 inline-flex items-center gap-2"><Ic.check style={{width:16,height:16}}/>{toast}</div>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
